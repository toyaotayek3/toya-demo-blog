<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Educ - Générateur de Gems pour l'Oral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animation pour les toasts */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        .toast-animate {
            animation: slideUpFade 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-white text-gray-800 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DONNÉES PÉDAGOGIQUES ---
        const gemsDatabase = {
            "Cycle 1": [
                {
                    id: "c1-dialogue", title: "Dialogue du Quotidien", icon: "MessageSquare",
                    description: "Un ami virtuel amusant pour aider l'enfant de maternelle à parler de sa journée et enrichir son vocabulaire.",
                    mission: "\"Tu es Léo, un petit perroquet curieux, joyeux et très gentil. Ta mission est de discuter avec un enfant de maternelle (3-6 ans). Encourage-le à parler de son quotidien (école, jeux). Utilise un vocabulaire très simple, pose une seule question à la fois. Si l'enfant fait une erreur de syntaxe, reformule doucement sa phrase de manière correcte sans le corriger frontalement.\"",
                    connaissances: ["Oser entrer en communication", "Échanger sur des sujets familiers", "Acquérir le vocabulaire journalier", "Développer sa syntaxe par l'écoute"],
                    complexite: "Débutant"
                },
                {
                    id: "c1-recit", title: "Récit et Narration", icon: "BookOpen",
                    description: "Accompagne l'enfant de Grande Section dans la structuration d'un récit simple à partir d'une histoire.",
                    mission: "\"Tu es un conteur magique. Aide un élève de Grande Section à raconter une histoire lue en classe. Pose des questions pour structurer son récit : 'Qui est le héros ?', 'Que se passe-t-il ensuite ?'. Aide-le à utiliser le 'langage d'évocation'.\"",
                    connaissances: ["Raconter seul un récit", "Respecter la trame narrative", "Utiliser le langage d'évocation"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c1-phonologie", title: "Maestro des Sons", icon: "Music",
                    description: "Jeux d'écoute et de prononciation pour travailler la conscience phonologique et l'articulation.",
                    mission: "\"Tu es Maestro. Joue avec un enfant de 4 à 6 ans. Fais-lui répéter des mots en séparant les syllabes (ex: CHA-TEAU) et propose des jeux de rimes simples.\"",
                    connaissances: ["Conscience phonologique", "Articuler distinctement", "Scander les syllabes"],
                    complexite: "Débutant"
                },
                {
                    id: "c1-monde", title: "Explorateur du Monde", icon: "Globe",
                    description: "Stimule la curiosité de l'enfant sur le vivant, les objets et la matière.",
                    mission: "\"Tu es un explorateur. Discute des plantes ou des animaux. Pose des questions qui commencent par 'Pourquoi' ou 'Comment'. Fais utiliser des verbes d'action précis.\"",
                    connaissances: ["Questionnement sur le vivant", "Utilisation de lexique spécifique", "Formuler des questions simples"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c1-metiers", title: "Jeu de Rôle : Métiers", icon: "ShoppingBag",
                    description: "Simule des situations de la vie courante (boulangerie, médecin) pour travailler les interactions sociales.",
                    mission: "\"Joue à faire-semblant. Tu es le boulanger. Accueille l'enfant et laisse-le formuler des demandes (Je voudrais...). Enrichis l'échange avec les formules de politesse.\"",
                    connaissances: ["Rites d'interaction", "Jeux de faire-semblant", "Vocabulaire thématique"],
                    complexite: "Avancé"
                }
            ],
            "Cycle 2": [
                {
                    id: "c2-dialogue", title: "Dialogue du Quotidien", icon: "MessageSquare",
                    description: "Un grand frère ou une grande sœur virtuel(le) pour inviter l'élève à raconter sa journée de façon chronologique.",
                    mission: "\"Tu es un grand frère ou une grande sœur très à l'écoute. Discute avec un élève de CP/CE1/CE2 (7-8 ans) de sa journée. Demande-lui de te raconter ce qu'il a fait à la récréation ou en classe. Incite-le doucement à utiliser des mots de liaison chronologiques comme 'd'abord', 'ensuite' et 'enfin'.\"",
                    connaissances: ["Raconter de manière chronologique", "Utiliser les connecteurs temporels", "S'exprimer clairement", "Participer à un échange verbal"],
                    complexite: "Débutant"
                },
                {
                    id: "c2-lecture", title: "Lecture à Haute Voix", icon: "Mic",
                    description: "Un auditeur attentif pour encourager l'élève à lire de manière fluide avec la bonne intonation.",
                    mission: "\"Tu es un coach de lecture. L'élève va te dicter ou te lire un texte. Félicite-le sur sa fluidité. Pose-lui des questions sur l'intonation : 'As-tu bien fait la pause au point ?'.\"",
                    connaissances: ["Lecture à voix haute", "Respect de la ponctuation", "Expressivité de la voix"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c2-explication", title: "Explication Scientifique", icon: "Lightbulb",
                    description: "Guide l'élève pour justifier une démarche ou expliquer une règle de jeu clairement.",
                    mission: "\"Tu es un professeur curieux. Demande à l'élève d'expliquer une expérience ou la règle d'un jeu. Incite-le à utiliser 'parce que'. S'il n'est pas clair, demande-lui de réexpliquer.\"",
                    connaissances: ["Expliquer et justifier", "Connecteurs logiques", "Prendre en compte l'auditoire"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c2-debat", title: "Le Conseil de Classe", icon: "Users",
                    description: "Initiation au débat argumenté : exprimer un désaccord de manière polie et justifier son point de vue.",
                    mission: "\"Anime un conseil d'élèves. Propose un sujet simple (ex: Améliorer la cour). Oppose poliment un contre-argument à l'élève pour l'obliger à justifier sa pensée avec 'Je pense que... parce que...'.\"",
                    connaissances: ["Exprimer un désaccord", "Régulation de la classe", "Respecter les règles de l'échange"],
                    complexite: "Avancé"
                },
                {
                    id: "c2-recit", title: "Récit d'Événement", icon: "Calendar",
                    description: "Apprendre à rapporter un événement chronologiquement en se faisant bien comprendre.",
                    mission: "\"Demande à l'élève de te raconter son week-end. Assure-toi qu'il respecte l'ordre chronologique. Aide-le à s'autocorriger sur les temps du passé (passé composé/imparfait).\"",
                    connaissances: ["Rapporter un événement", "Conjugaison au passé", "Clarté de l'énoncé"],
                    complexite: "Intermédiaire"
                }
            ],
            "Cycle 3": [
                {
                    id: "c3-dialogue", title: "Dialogue du Quotidien", icon: "MessageSquare",
                    description: "Un correspondant lointain pour échanger sur la vie quotidienne et justifier ses centres d'intérêt.",
                    mission: "\"Tu es un correspondant francophone vivant dans un autre pays. Pose des questions à l'élève (CM1-CM2-6ème) sur sa vie quotidienne en France, ses loisirs et l'école. Lorsqu'il te parle de ses préférences, demande-lui toujours de les justifier avec des arguments personnels. Ton vocabulaire doit être riche et précis.\"",
                    connaissances: ["Justifier un choix personnel", "Interagir de façon constructive", "Utiliser un lexique précis", "Adapter son registre de langue"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c3-expose", title: "Exposé Structuré", icon: "MonitorPlay",
                    description: "Préparation à la prise de parole continue (5 minutes) avec hiérarchisation des informations.",
                    mission: "\"Tu es un tuteur préparant un élève à faire un exposé. Demande-lui son plan. Vérifie qu'il hiérarchise bien ses idées. Rappelle-lui de se détacher de ses notes.\"",
                    connaissances: ["Exposé court (5 min)", "Hiérarchisation des infos", "Se détacher de ses notes"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "c3-debat", title: "Débat Citoyen", icon: "Scale",
                    description: "Apprendre à distinguer un fait d'une opinion et à argumenter face à un contradicteur.",
                    mission: "\"Tu es modérateur d'un débat. Lance un sujet (ex: l'écologie). Fais attention à ce que l'élève distingue une connaissance scientifique d'une simple opinion. Relance-le pour approfondir.\"",
                    connaissances: ["Distinguer fait/opinion", "Débattre et échanger", "Argumenter"],
                    complexite: "Avancé"
                },
                {
                    id: "c3-poesie", title: "Lecture Expressive", icon: "MicVocal",
                    description: "Travailler la mise en voix de textes de théâtre ou de poésie en maîtrisant la prosodie.",
                    mission: "\"Tu es metteur en scène. Fais travailler l'élève sur la mise en voix d'un poème. Donne-lui des conseils sur le ton, le rythme, les silences et l'accentuation.\"",
                    connaissances: ["Maîtrise de la prosodie", "Interprétation de textes", "Ton et rythme"],
                    complexite: "Avancé"
                },
                {
                    id: "c3-medias", title: "Détective des Médias", icon: "Search",
                    description: "Identifier les sources de l'information et formuler une analyse critique à l'oral.",
                    mission: "\"Tu es rédacteur en chef. Discute d'une actualité. Demande à l'élève de justifier la source et de formuler une critique. L'objectif est de développer une distance critique.\"",
                    connaissances: ["Éducation aux médias", "Identifier les sources", "Formuler une critique"],
                    complexite: "Avancé"
                }
            ],
            "Cycle 4": [
                {
                    id: "c4-dialogue", title: "Dialogue du Quotidien", icon: "MessageSquare",
                    description: "Un mentor pour inciter l'adolescent à verbaliser ses émotions et argumenter ses choix du quotidien.",
                    mission: "\"Tu es un mentor bienveillant (type étudiant plus âgé). Discute avec l'élève de collège (12-14 ans) de sa journée, de ses relations amicales ou de la culture (musique, jeux vidéos). Pousse-le à aller au-delà du 'c'était bien' : demande-lui d'exprimer des émotions complexes, d'utiliser des nuances et de structurer ses avis avec des connecteurs logiques.\"",
                    connaissances: ["Exprimer des émotions complexes", "Structurer un avis", "Nuancer ses propos", "Interaction spontanée argumentée"],
                    complexite: "Avancé"
                },
                {
                    id: "c4-plaidoyer", title: "Plaidoyer DNB", icon: "Award",
                    description: "Préparation à l'oral du Brevet (présentation longue sans notes).",
                    mission: "\"Tu es un jury du DNB. L'élève doit présenter son projet. Relance-le pour le pousser à se détacher de ses notes. Exige un niveau de langue soutenu et teste ses arguments.\"",
                    connaissances: ["Présentation longue", "Se détacher des notes", "Niveau de langue soutenu"],
                    complexite: "Expert"
                },
                {
                    id: "c4-critique", title: "Critique Littéraire", icon: "Film",
                    description: "Développer une argumentation construite pour donner un avis sur une œuvre.",
                    mission: "\"Tu es journaliste. Interviewe l'élève sur un film/livre. Demande-lui d'exprimer ses sensations et de justifier son avis esthétique pendant au moins 5 minutes.\"",
                    connaissances: ["Analyse esthétique", "Donner un avis argumenté", "Tenir un propos de 5 min"],
                    complexite: "Avancé"
                },
                {
                    id: "c4-animation", title: "Maître de Cérémonie", icon: "Mic",
                    description: "Apprendre à animer un débat, poser une problématique et distribuer la parole.",
                    mission: "\"L'élève est animateur du débat. Tu vas jouer plusieurs personnes avec des avis différents. Il doit distribuer la parole, synthétiser les avis et conclure.\"",
                    connaissances: ["Animer un débat", "Synthétiser des avis", "Distribuer la parole"],
                    complexite: "Expert"
                },
                {
                    id: "c4-implicite", title: "Décodeur de l'Implicite", icon: "BrainCircuit",
                    description: "Travailler la compréhension des discours complexes et repérer l'ironie.",
                    mission: "\"Propose une courte phrase satirique. Demande à l'élève d'expliquer ce qui n'est pas dit explicitement. Fais-le parler sur l'ironie et les sous-entendus.\"",
                    connaissances: ["Comprendre l'implicite", "Ironie et satire", "Analyser le discours"],
                    complexite: "Avancé"
                }
            ],
            "Lycée": [
                {
                    id: "lyc-dialogue", title: "Dialogue du Quotidien", icon: "MessageSquare",
                    description: "Échanges matures sur l'actualité, l'orientation et l'équilibre de vie avec un étudiant universitaire.",
                    mission: "\"Tu es un étudiant à l'université ou un jeune professionnel. Échange avec le lycéen sur son quotidien, son équilibre entre travail et loisirs, l'actualité générale et ses projets d'orientation. Ton ton doit être d'égal à égal mais exiger un niveau de langue courant à soutenu. Invite-le systématiquement à mettre en perspective ses expériences personnelles avec des enjeux de société plus larges.\"",
                    connaissances: ["Mettre en perspective", "Niveau de langue soutenu", "Débattre de l'actualité", "Articuler vie perso et enjeux de société"],
                    complexite: "Intermédiaire"
                },
                {
                    id: "lyc-grandoral", title: "Préparation Grand Oral", icon: "GraduationCap",
                    description: "Simulateur du Grand Oral : argumentation et échange avec le jury.",
                    mission: "\"Tu es jury du Grand Oral du Bac. Mène un échange de 10 minutes après sa présentation. Pose des questions pointues pour tester sa capacité à lier son sujet à son orientation.\"",
                    connaissances: ["Soutenance Grand Oral", "Argumentation experte", "Projet d'orientation", "Éloquence"],
                    complexite: "Expert"
                }
            ]
        };

        const createThemeLibre = (cycleName) => ({
            id: `libre-${cycleName}`,
            title: "Thème Libre",
            icon: "Plus",
            isCustom: true,
            description: "Créez votre propre structure de Gem personnalisée.",
            mission: "",
            connaissances: ["Compétences personnalisées"],
            complexite: "Variable"
        });

        const Icon = ({ name, className }) => {

                ShoppingBag: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,

                Copy: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>,
                Check: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
                Save: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
                Settings: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
                HelpCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" x2="12.01" y1="17" y2="17"></line></svg>,
                Library: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 6 4 14"></path><path d="M12 6v14"></path><path d="M8 8v12"></path><path d="M4 4v16"></path></svg>,
                Trash2: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
            };
            return <div className={className}>{icons[name] || icons.HelpCircle}</div>;
        };

        const CopyButton = ({ text, label }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <button 
                    onClick={handleCopy}
                    className="flex items-center space-x-1 text-xs font-semibold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-wider"
                >
                    <Icon name={copied ? "Check" : "Copy"} className="w-4 h-4" />
                    <span>{copied ? "Copié!" : label}</span>
                </button>
            );
        };

        const App = () => {
            // --- ETATS DE L'APPLICATION ---
            const cycles = ["Cycle 1", "Cycle 2", "Cycle 3", "Cycle 4", "Lycée"];
            const [activeCycle, setActiveCycle] = useState("Cycle 1");
            const [selectedGemId, setSelectedGemId] = useState("c1-dialogue");
            
            // Navigation
            const [activeTab, setActiveTab] = useState("dashboard"); // 'dashboard', 'myGems', 'resources'
            
            // Sauvegarde des Gems
            const [savedGems, setSavedGems] = useState([]);
            const [toastMessage, setToastMessage] = useState(null);

            // Variance (Modification dynamique de la mission via étiquette)
            const [selectedVarianceTag, setSelectedVarianceTag] = useState(null);

            // Formulaire Thème libre
            const [customForm, setCustomForm] = useState({
                title: "", context: "", objective: "", skills: ""
            });

            // Récupération des Gems actuels
            const currentGems = [...(gemsDatabase[activeCycle] || []), createThemeLibre(activeCycle)];
            const activeGem = currentGems.find(g => g.id === selectedGemId) || currentGems[0];

            // Changement de cycle : on réinitialise le Gem sélectionné et la variance
            useEffect(() => {
                if (!currentGems.find(g => g.id === selectedGemId)) {
                    setSelectedGemId(currentGems[0].id);
                }
                setSelectedVarianceTag(null);
            }, [activeCycle]);
            
            // Changement de Gem : on réinitialise la variance
            useEffect(() => {
                setSelectedVarianceTag(null);
            }, [selectedGemId]);

            // --- LOGIQUE DES FONCTIONNALITÉS ---

            const handleCustomFormChange = (e) => {
                setCustomForm({...customForm, [e.target.name]: e.target.value});
            };

            // Fonction pour générer la mission finale (incluant la variance si cliquée)
            const getFinalMissionText = () => {
                if (activeGem.isCustom) {
                    if(!customForm.context && !customForm.objective) return "Veuillez remplir les champs ci-dessus pour générer le prompt.";
                    let base = `"Tu es un assistant pédagogique pour des élèves de ${activeCycle}. Ton rôle est de les faire parler de la thématique suivante : ${customForm.context}. Ton objectif pédagogique est : ${customForm.objective}. Pose des questions courtes et relance l'élève pour l'aider à structurer sa pensée."`;
                    if (selectedVarianceTag) base += `\n\n📌 DIRECTIVE SPÉCIALE (Focus sur : ${selectedVarianceTag}) : Pour cette interaction, concentre toutes tes relances sur cette compétence spécifique. Guide l'élève pas à pas pour qu'il maîtrise cet aspect.`;
                    return base;
                } else {
                    let base = activeGem.mission;
                    if (selectedVarianceTag) base += `\n\n📌 DIRECTIVE SPÉCIALE (Focus sur : ${selectedVarianceTag}) : Pour cette interaction, concentre toutes tes relances sur cette compétence spécifique. Guide l'élève pas à pas pour qu'il maîtrise cet aspect avant de passer à autre chose.`;
                    return base;
                }
            };

            const getFinalConnaissances = () => {
                if (activeGem.isCustom) {
                    return customForm.skills ? customForm.skills.split(',').map(s => s.trim()) : ["Compétences personnalisées"];
                }
                return activeGem.connaissances;
            };

            const getFinalTitle = () => {
                return activeGem.isCustom ? (customForm.title || "Gem Personnalisé") : activeGem.title;
            };

            const handleSaveGem = () => {
                const newSavedGem = {
                    id: `saved-${Date.now()}`,
                    title: getFinalTitle(),
                    cycle: activeCycle,
                    mission: getFinalMissionText(),
                    connaissances: getFinalConnaissances(),
                    date: new Date().toLocaleDateString('fr-FR'),
                    icon: activeGem.icon
                };
                setSavedGems([newSavedGem, ...savedGems]);
                showToastNotification("Gem enregistré avec succès ! Retrouvez-le dans 'Mes Gems'.");
            };

            const handleDeleteSavedGem = (idToDelete) => {
                setSavedGems(savedGems.filter(gem => gem.id !== idToDelete));
            };

            const showToastNotification = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 4000);
            };

            // --- RENDU DES VUES (ONGLETS) ---

            const renderDashboard = () => (
                <div className="max-w-6xl mx-auto">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Générateur de Gems pour l'Oral</h2>
                        <p className="text-gray-500 text-sm">
                            Créez des assistants personnalisés pour accompagner vos élèves dans la maîtrise de l'expression orale, selon les attendus officiels de chaque cycle.
                        </p>
                    </div>

                    {/* GEMS GRID */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                        {currentGems.map(gem => {
                            const isActive = selectedGemId === gem.id;
                            return (
                                <button
                                    key={gem.id}
                                    onClick={() => setSelectedGemId(gem.id)}
                                    className={`text-left p-6 rounded-xl border-2 transition-all duration-200 flex flex-col items-start ${
                                        isActive 
                                        ? "border-indigo-400 bg-indigo-50/30 shadow-sm" 
                                        : "border-gray-100 bg-white hover:border-gray-200 hover:shadow-sm"
                                    }`}
                                >
                                    <div className={`p-3 rounded-lg mb-4 ${isActive ? "bg-white shadow-sm" : "bg-gray-50"}`}>
                                        <Icon name={gem.icon} className={`w-6 h-6 ${isActive ? "text-indigo-600" : "text-gray-600"}`} />
                                    </div>
                                    <h3 className="font-bold text-gray-900 mb-1">{gem.title}</h3>
                                    <p className="text-xs text-gray-500 line-clamp-2">
                                        {activeCycle}. {gem.description}
                                    </p>
                                    {isActive && (
                                        <div className="absolute top-4 right-4 w-2 h-2 rounded-full bg-indigo-600"></div>
                                    )}
                                </button>
                            );
                        })}
                    </div>

                    {/* CONFIGURATION PANEL */}
                    <div className="bg-white border-2 border-gray-100 rounded-xl overflow-hidden shadow-sm mb-12">
                        <div className="bg-gray-50 border-b border-gray-100 px-6 py-3 flex justify-between items-center">
                            <span className="text-xs font-bold text-gray-400 tracking-wider uppercase">Configuration du Gem</span>
                        </div>
                        
                        <div className="p-8">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <div className="text-xs font-bold text-indigo-600 tracking-wider uppercase mb-2">
                                        Thème : {activeGem.title}
                                    </div>
                                    {activeGem.isCustom ? (
                                        <input 
                                            type="text" name="title"
                                            placeholder="Titre de votre Gem (ex: Mon Ami Dinosaure)" 
                                            value={customForm.title} onChange={handleCustomFormChange}
                                            className="text-2xl font-bold text-gray-900 border-b border-gray-300 focus:border-indigo-600 outline-none pb-1 w-full md:w-96"
                                        />
                                    ) : (
                                        <h3 className="text-2xl font-bold text-gray-900">{activeGem.title} : Assistant d'oral</h3>
                                    )}
                                </div>
                                <button 
                                    onClick={handleSaveGem}
                                    className="bg-gray-900 hover:bg-gray-800 text-white text-sm font-semibold py-2 px-4 rounded-lg flex items-center space-x-2 transition-colors"
                                >
                                    <Icon name="Save" className="w-4 h-4" />
                                    <span>Enregistrer le Gem</span>
                                </button>
                            </div>

                            {activeGem.isCustom ? (
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 tracking-wider uppercase mb-2">Contexte / Sujet de discussion</label>
                                        <textarea 
                                            name="context" value={customForm.context} onChange={handleCustomFormChange}
                                            placeholder="Ex: Les dinosaures, l'écologie, un livre lu en classe..."
                                            className="w-full bg-gray-50 rounded-lg p-4 text-sm text-gray-700 border border-transparent focus:border-indigo-300 focus:bg-white outline-none resize-none h-20"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 tracking-wider uppercase mb-2">Objectif visé à l'oral</label>
                                        <textarea 
                                            name="objective" value={customForm.objective} onChange={handleCustomFormChange}
                                            placeholder="Ex: Formuler des phrases complètes, utiliser le futur, argumenter..."
                                            className="w-full bg-gray-50 rounded-lg p-4 text-sm text-gray-700 border border-transparent focus:border-indigo-300 focus:bg-white outline-none resize-none h-20"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 tracking-wider uppercase mb-2">Connaissances Attendues (séparées par des virgules)</label>
                                        <input 
                                            name="skills" value={customForm.skills} onChange={handleCustomFormChange}
                                            placeholder="Ex: Vocabulaire spécifique, respect des tours de parole"
                                            className="w-full bg-gray-50 rounded-lg p-4 text-sm text-gray-700 border border-transparent focus:border-indigo-300 focus:bg-white outline-none"
                                        />
                                    </div>
                                    
                                    {/* Etiquettes de variance pour Thème Libre */}
                                    {getFinalConnaissances().length > 0 && getFinalConnaissances()[0] !== "" && (
                                        <div className="pt-2">
                                            <p className="text-xs text-indigo-500 mb-2 italic">Astuce : Cliquez sur une compétence ci-dessous pour créer une variance ciblant spécifiquement cette compétence.</p>
                                            <div className="flex flex-wrap gap-2">
                                                {getFinalConnaissances().map((conn, idx) => (
                                                    <button 
                                                        key={idx} 
                                                        onClick={() => setSelectedVarianceTag(selectedVarianceTag === conn ? null : conn)}
                                                        className={`border px-3 py-1.5 rounded-full text-xs font-medium shadow-sm transition-colors ${
                                                            selectedVarianceTag === conn 
                                                            ? "bg-indigo-600 text-white border-indigo-600" 
                                                            : "bg-white text-gray-700 border-gray-200 hover:bg-indigo-50 hover:border-indigo-200"
                                                        }`}
                                                    >
                                                        {conn}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="pt-4 border-t border-gray-100">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">Mission Générée (Prompt)</div>
                                            <CopyButton text={getFinalMissionText()} label="Copier" />
                                        </div>
                                        <div className="bg-indigo-50/50 rounded-lg p-5 border border-indigo-100">
                                            <p className="text-sm text-gray-800 italic whitespace-pre-wrap leading-relaxed">
                                                {getFinalMissionText()}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-8">
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">Description</div>
                                            <CopyButton text={activeGem.description} label="Copier" />
                                        </div>
                                        <div className="bg-gray-50 rounded-lg p-5">
                                            <p className="text-sm text-gray-700 leading-relaxed">{activeGem.description}</p>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">Connaissances Attendues (Cliquer pour générer une variance)</div>
                                            <CopyButton text={activeGem.connaissances.join(", ")} label="Copier la liste" />
                                        </div>
                                        <p className="text-xs text-gray-500 mb-2 italic">Cliquez sur une étiquette pour adapter dynamiquement la mission à cette compétence spécifique.</p>
                                        <div className="flex flex-wrap gap-3">
                                            {activeGem.connaissances.map((conn, idx) => {
                                                const isSelected = selectedVarianceTag === conn;
                                                return (
                                                    <button 
                                                        key={idx} 
                                                        onClick={() => setSelectedVarianceTag(isSelected ? null : conn)}
                                                        className={`border px-4 py-2 rounded-full text-xs font-medium shadow-sm transition-colors ${
                                                            isSelected 
                                                            ? "bg-indigo-600 text-white border-indigo-600 ring-2 ring-indigo-200 ring-offset-1" 
                                                            : "bg-white text-gray-700 border-gray-200 hover:bg-indigo-50 hover:border-indigo-200"
                                                        }`}
                                                    >
                                                        {conn}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">
                                                Mission {selectedVarianceTag && <span className="text-indigo-600">(Variance active)</span>}
                                            </div>
                                            <CopyButton text={getFinalMissionText().replace(/"/g, '')} label="Copier le Prompt" />
                                        </div>
                                        <div className={`rounded-lg p-5 border transition-colors ${selectedVarianceTag ? "bg-indigo-50/50 border-indigo-200" : "bg-gray-50 border-transparent"}`}>
                                            <p className="text-sm text-gray-600 italic whitespace-pre-wrap leading-relaxed">{getFinalMissionText()}</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="mt-8 pt-6 border-t border-gray-100 flex justify-between items-center">
                                <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">Complexité Pédagogique</div>
                                <div className="text-sm font-semibold text-gray-900 bg-gray-100 px-3 py-1 rounded-md">
                                    {activeGem.complexite}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderMyGems = () => (
                <div className="max-w-6xl mx-auto">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Mes Gems Enregistrés</h2>
                        <p className="text-gray-500 text-sm">
                            Retrouvez ici tous les prompts que vous avez générés et personnalisés, prêts à être utilisés sur la plateforme Gemini.
                        </p>
                    </div>

                    {savedGems.length === 0 ? (
                        <div className="bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 p-12 text-center">
                            <Icon name="Library" className="w-12 h-12 text-gray-300 mx-auto mb-4" />
                            <h3 className="text-lg font-bold text-gray-900 mb-2">Aucun Gem enregistré</h3>
                            <p className="text-gray-500 text-sm">Allez dans le Tableau de bord pour configurer et sauvegarder vos premiers Gems.</p>
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className="mt-6 bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors"
                            >
                                Retour au Tableau de bord
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {savedGems.map(gem => (
                                <div key={gem.id} className="bg-white border border-gray-200 rounded-xl p-6 shadow-sm flex flex-col md:flex-row gap-6">
                                    <div className="md:w-1/3 border-b md:border-b-0 md:border-r border-gray-100 pb-4 md:pb-0 md:pr-6">
                                        <div className="flex items-center space-x-3 mb-3">
                                            <div className="bg-indigo-50 p-2 rounded-lg text-indigo-600">
                                                <Icon name={gem.icon} className="w-5 h-5" />
                                            </div>
                                            <h3 className="text-lg font-bold text-gray-900">{gem.title}</h3>
                                        </div>
                                        <div className="flex items-center space-x-2 text-xs text-gray-500 mb-4">
                                            <span className="bg-gray-100 px-2 py-1 rounded">{gem.cycle}</span>
                                            <span>•</span>
                                            <span>Enregistré le {gem.date}</span>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {gem.connaissances.map((conn, idx) => (
                                                <span key={idx} className="bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded text-[10px] font-medium">
                                                    {conn}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="md:w-2/3 flex flex-col justify-between">
                                        <div className="bg-gray-50 p-4 rounded-lg mb-4">
                                            <p className="text-sm text-gray-600 italic line-clamp-4 whitespace-pre-wrap">{gem.mission}</p>
                                        </div>
                                        <div className="flex justify-end space-x-3">
                                            <button 
                                                onClick={() => handleDeleteSavedGem(gem.id)}
                                                className="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                            >
                                                <Icon name="Trash2" className="w-4 h-4" />
                                                <span>Supprimer</span>
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    navigator.clipboard.writeText(gem.mission.replace(/"/g, ''));
                                                    showToastNotification("Mission copiée dans le presse-papiers !");
                                                }}
                                                className="flex items-center space-x-2 px-4 py-2 text-sm font-semibold bg-gray-900 text-white hover:bg-gray-800 rounded-lg transition-colors"
                                            >
                                                <Icon name="Copy" className="w-4 h-4" />
                                                <span>Copier le Prompt</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderResources = () => (
                <div className="max-w-4xl mx-auto">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Ressources Officielles (BO)</h2>
                        <p className="text-gray-500 text-sm">
                            Synthèse des attendus de l'oral selon les Bulletins Officiels de l'Éducation Nationale.
                        </p>
                    </div>

                    <div className="space-y-6">
                        <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-xl">
                            <h3 className="text-lg font-bold text-indigo-900 mb-2">L'Oral, objet et vecteur d'apprentissage</h3>
                            <p className="text-sm text-indigo-800 leading-relaxed">
                                Selon les orientations des programmes actuels (BO 2020, 2021, 2023), l'oral n'est plus seulement un outil de communication spontanée. Il est à la fois l'objet de l'enseignement (apprendre à parler) et le vecteur des autres apprentissages (parler pour apprendre). Cette trajectoire spiralaire prépare les élèves du langage d'évocation (maternelle) à l'argumentation experte (Grand Oral du Lycée).
                            </p>
                        </div>

                        <div className="bg-white border border-gray-200 p-6 rounded-xl shadow-sm">
                            <h3 className="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Attendus par Cycle</h3>
                            
                            <div className="space-y-4">
                                <div>
                                    <h4 className="font-semibold text-gray-800 text-sm">Cycle 1 (Maternelle) - BO 2021</h4>
                                    <ul className="list-disc pl-5 text-sm text-gray-600 mt-1 space-y-1">
                                        <li>Oser entrer en communication et comprendre la consigne.</li>
                                        <li>Acquérir et mobiliser le vocabulaire journalier (objectif 2500 mots).</li>
                                        <li>Éveil à la conscience phonologique (scander les syllabes).</li>
                                    </ul>
                                </div>
                                
                                <div>
                                    <h4 className="font-semibold text-gray-800 text-sm">Cycle 2 (CP-CE1-CE2) - BO 2023</h4>
                                    <ul className="list-disc pl-5 text-sm text-gray-600 mt-1 space-y-1">
                                        <li>Lecture à voix haute fluide (90 mots/min en fin de cycle) avec expressivité.</li>
                                        <li>Raconter un événement ou une histoire de manière chronologique.</li>
                                        <li>Participer à des échanges argumentés (Conseil d'élèves).</li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 className="font-semibold text-gray-800 text-sm">Cycle 3 (CM1-CM2-6e) - BO 2023</h4>
                                    <ul className="list-disc pl-5 text-sm text-gray-600 mt-1 space-y-1">
                                        <li>Exposé continu de 5 minutes avec hiérarchisation des informations.</li>
                                        <li>Distinguer fait et opinion lors d'un débat.</li>
                                        <li>Justifier ses propos et respecter la parole de l'autre.</li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 className="font-semibold text-gray-800 text-sm">Cycle 4 (5e-4e-3e) - BO 2020</h4>
                                    <ul className="list-disc pl-5 text-sm text-gray-600 mt-1 space-y-1">
                                        <li>Soutenance du DNB (10 minutes) en se détachant de ses notes.</li>
                                        <li>Développer une critique construite sur une œuvre (arts, médias).</li>
                                        <li>Saisir l'implicite et l'ironie dans un discours.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-full w-full bg-white relative">
                    {/* TOAST NOTIFICATION */}
                    {toastMessage && (
                        <div className="absolute bottom-8 left-1/2 z-50 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg flex items-center space-x-3 toast-animate">
                            <Icon name="Check" className="w-5 h-5 text-green-400" />
                            <span className="text-sm font-medium">{toastMessage}</span>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <div className="w-64 border-r border-gray-100 flex flex-col justify-between py-6 shrink-0 h-full">
                        <div>
                            <div className="flex items-center space-x-3 px-6 mb-10">
                                <div className="text-indigo-600">
                                    <Icon name="Gem" className="w-8 h-8" />
                                </div>
                                <h1 className="text-xl font-bold text-gray-800">Gemini Educ</h1>
                            </div>
                            
                            <div className={`transition-opacity duration-300 ${activeTab === 'dashboard' ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                                <div className="px-6 mb-4 text-xs font-bold text-gray-400 tracking-wider uppercase">
                                    Niveaux Scolaires
                                </div>
                                <nav className="space-y-1 px-4">
                                    {cycles.map(cycle => (
                                        <button
                                            key={cycle}
                                            onClick={() => setActiveCycle(cycle)}
                                            className={`w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                                activeCycle === cycle 
                                                ? "bg-indigo-600 text-white" 
                                                : "text-gray-600 hover:bg-gray-50 hover:text-indigo-600"
                                            }`}
                                        >
                                            <Icon name="GraduationCap" className={`w-5 h-5 ${activeCycle === cycle ? "text-indigo-200" : "text-gray-400"}`} />
                                            <span>{cycle}</span>
                                        </button>
                                    ))}
                                </nav>
                            </div>
                        </div>
                        
                        <div className="px-4 space-y-1">
                            <button className="w-full flex items-center space-x-3 px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50">
                                <Icon name="Settings" className="w-5 h-5 text-gray-400" />
                                <span>Paramètres</span>
                            </button>
                            <button className="w-full flex items-center space-x-3 px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50">
                                <Icon name="HelpCircle" className="w-5 h-5 text-gray-400" />
                                <span>Aide</span>
                            </button>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-white">
                        {/* TOP NAV */}
                        <div className="h-16 border-b border-gray-100 flex items-center px-8 space-x-8 shrink-0">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className={`font-semibold text-sm h-full transition-colors ${activeTab === 'dashboard' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-500 hover:text-gray-900 border-b-2 border-transparent'}`}
                            >
                                Tableau de bord
                            </button>
                            <button 
                                onClick={() => setActiveTab('myGems')}
                                className={`font-semibold text-sm h-full flex items-center space-x-2 transition-colors ${activeTab === 'myGems' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-500 hover:text-gray-900 border-b-2 border-transparent'}`}
                            >
                                <span>Mes Gems</span>
                                {savedGems.length > 0 && (
                                    <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeTab === 'myGems' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500'}`}>
                                        {savedGems.length}
                                    </span>
                                )}
                            </button>
                            <button 
                                onClick={() => setActiveTab('resources')}
                                className={`font-semibold text-sm h-full transition-colors ${activeTab === 'resources' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-500 hover:text-gray-900 border-b-2 border-transparent'}`}
                            >
                                Ressources BO
                            </button>
                        </div>

                        {/* CONTENT AREA */}
                        <div className="flex-1 overflow-y-auto p-8 scrollbar-hide bg-[#FAFAFA]">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'myGems' && renderMyGems()}
                            {activeTab === 'resources' && renderResources()}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
